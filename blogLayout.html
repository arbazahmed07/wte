<!DOCTYPE html>
<html>
<head>
    <title>Responsive Blog Layout</title>

    <style>

        body {
            margin: 0;
            font-family: Arial;
            background-color: white;
            color: black;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #555;
            padding: 10px;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .content {
            flex: 3;
        }

        .sidebar {
            flex: 1;
            border-left: 1px solid gray;
            padding-left: 15px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }

        button {
            padding: 8px 12px;
            margin-top: 10px;
        }

        .dark {
            background-color: #121212;
            color: white;
        }

        .dark nav {
            background-color: #222;
        }

        .dark .sidebar {
            border-color: white;
        }

        @media (max-width: 700px) {

            .container {
                flex-direction: column;
            }
        }

    </style>
</head>

<body>

<header>
    <h1>My Blog</h1>

    <button onclick="toggleDarkMode()">
        Toggle Dark Mode
    </button>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Blogs</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <div class="content">

        <h2>Blog Title</h2>

        <p>
            This is the main blog content area.
            You can add articles, images, and text here.
        </p>

        <p>
            Responsive layout is created using Flexbox.
        </p>

    </div>

    <div class="sidebar">

        <h3>Recent Posts</h3>

        <ul>
            <li>JavaScript Basics</li>
            <li>CSS Flexbox Guide</li>
            <li>HTML Forms</li>
            <li>Dark Mode Design</li>
        </ul>

    </div>

</div>

<footer>
    © 2026 My Blog
</footer>

<script>

function toggleDarkMode() {

    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {

        localStorage.setItem("theme", "dark");
    }
    else {

        localStorage.setItem("theme", "light");
    }
}

window.onload = function() {

    let theme = localStorage.getItem("theme");

    if (theme == "dark") {

        document.body.classList.add("dark");
    }
}

</script>

</body>
</html>
