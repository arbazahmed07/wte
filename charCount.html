<!DOCTYPE html>
<html>
<head>
    <title>Character Counter Tool</title>

    <style>
        body {
            font-family: Arial;
            width: 500px;
            margin: auto;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
        }

        .red {
            color: red;
        }
    </style>
</head>

<body>

<h2>Real-Time Character Counter</h2>

<textarea id="text"
          onkeyup="countText()"
          placeholder="Enter text here...">
</textarea>

<br><br>

<p id="charCount">
    Characters: 0
</p>

<p>
    Words:
    <span id="wordCount">0</span>
</p>

<p>
    Sentences:
    <span id="sentenceCount">0</span>
</p>

<script>

function countText() {

    let text =
        document.getElementById("text").value;

    let characters = text.length;

    let words =
        text.trim() == "" ?
        0 :
        text.trim().split(/\s+/).length;

    let sentences =
        text.split(/[.!?]+/)
        .filter(s => s.trim() != "").length;

    let charElement =
        document.getElementById("charCount");

    charElement.innerHTML =
        "Characters: " + characters;

    document.getElementById("wordCount").innerHTML =
        words;

    document.getElementById("sentenceCount").innerHTML =
        sentences;

    if (characters > 200) {
        charElement.classList.add("red");
    }
    else {
        charElement.classList.remove("red");
    }
}

</script>

</body>
</html>
